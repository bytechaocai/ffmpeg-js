<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>转码结果总结</title>
  <style>
    /* 样式表来源：mdn table示例 */
    table {
      border-collapse: collapse;
      border: 2px solid rgb(140 140 140);
      font-family: sans-serif;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    caption {
      caption-side: top;
      padding: 10px;
      font-weight: bold;
    }

    thead,
    tfoot {
      background-color: rgb(228 240 245);
    }

    th,
    td {
      border: 1px solid rgb(160 160 160);
      padding: 8px 10px;
    }

    td:last-of-type {
      text-align: center;
    }

    tbody>tr:nth-of-type(even) {
      background-color: rgb(237 238 242);
    }

    tfoot th {
      text-align: center;
    }

    tfoot td {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <table>
    <caption>转码结果总结</caption>
    <thead>
      <tr>
        <th>文件名</th>
        <th>分辨率</th>
        <th>时长</th>
        <th>文件大小（字节）</th>
        <th>新文件大小（字节）</th>
        <th>码率（kb/s）</th>
        <th>新码率（kb/s）</th>
        <th>压缩比</th>
      </tr>
    </thead>
    <tbody />
  </table>

</body>

</html>
